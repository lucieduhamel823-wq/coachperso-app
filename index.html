<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
<title>CoachPerso</title>
<meta name="theme-color" content="#FF8C00">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CoachPerso">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-180.png">
<link rel="stylesheet" href="styles.css?v=13">
</head>
<body>

<div id="app">

  <!-- HEADER -->
  <header class="topbar">
    <div class="topbar-title" id="topbarTitle">Aujourd'hui</div>
    <div class="topbar-actions">
      <button class="icon-btn" id="settingsBtn" aria-label="Réglages">⚙️</button>
    </div>
  </header>

  <!-- MAIN VIEWS -->
  <main id="views">

    <!-- ACCUEIL — écran épuré : salutation + mantra + citation -->
    <section class="view" id="view-accueil">
      <div class="greeting-screen" id="greetingScreen">
        <div class="greeting-hello" id="greetingHello"></div>
        <div class="greeting-block">
          <div class="greeting-label">Mantra du jour</div>
          <div class="greeting-text" id="greetingMantra"></div>
        </div>
        <div class="greeting-block">
          <div class="greeting-label">Motivation</div>
          <div class="greeting-text" id="greetingQuote"></div>
        </div>
      </div>
    </section>

    <!-- ENTRAINEMENT (mes entraînements + historique + nouvelle séance) -->
    <section class="view hidden" id="view-entrainement">
      <div class="filter-row" id="entrainementTabs">
        <button class="chip active" data-etab="mes">Mes entraînements</button>
        <button class="chip" data-etab="historique">Historique des séances</button>
        <button class="chip" data-etab="nouvelle">Nouvelle séance</button>
      </div>

      <div id="entMes">
        <div id="dashboardScores"></div>
        <div id="weekProgress" class="card week-progress"></div>
        <div id="nextSessionCard"></div>
        <h3 class="section-title">À suivre ensuite</h3>
        <div id="upcomingList" class="upcoming-list"></div>
      </div>

      <div id="entHistorique" class="hidden">
        <div class="field"><input type="text" id="histSearchInput" placeholder="Rechercher : exercice, date, nom de séance..."></div>
        <div class="filter-row" id="histFilters">
          <button class="chip active" data-filter="all">Tout</button>
          <button class="chip" data-filter="muscu">Muscu</button>
          <button class="chip" data-filter="course">Course</button>
        </div>
        <div id="historyList" class="history-list"></div>
      </div>

      <div id="entNouvelle" class="hidden">
        <div id="nouvelleSeanceContent"></div>
      </div>
    </section>

    <!-- NUTRITION -->
    <section class="view hidden" id="view-nutrition">
      <div id="santeContent"></div>
    </section>

    <!-- REGLAGES -->
    <section class="view hidden" id="view-reglages">
      <div id="reglagesContent"></div>
    </section>

  </main>

  <!-- Dégradé partagé pour les icônes -->
  <svg width="0" height="0" style="position:absolute;">
    <defs>
      <linearGradient id="brandGradient" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0" stop-color="#FFD400"/>
        <stop offset="1" stop-color="#FF8C00"/>
      </linearGradient>
    </defs>
  </svg>

  <!-- BOTTOM NAV -->
  <nav class="bottomnav">
    <button class="navbtn active" data-view="accueil">
      <span class="navicon">
        <svg viewBox="0 0 24 24"><path class="ic-shape" d="M12 3.2 3.6 9.8v9.6c0 .6.4 1 1 1h5.4v-6.5c0-.5.4-.9.9-.9h2.2c.5 0 .9.4.9.9v6.5H19.4c.6 0 1-.4 1-1V9.8Z"/></svg>
      </span><span>Accueil</span>
    </button>
    <button class="navbtn" data-view="entrainement">
      <span class="navicon">
        <svg viewBox="0 0 24 24">
          <rect class="ic-shape" x="9" y="10.4" width="6" height="3.2" rx="1.4"/>
          <rect class="ic-shape" x="2.8" y="7.8" width="3.2" height="8.4" rx="1.5"/>
          <rect class="ic-shape" x="18" y="7.8" width="3.2" height="8.4" rx="1.5"/>
          <rect class="ic-shape" x="1.2" y="10" width="1.6" height="4" rx="0.8"/>
          <rect class="ic-shape" x="21.2" y="10" width="1.6" height="4" rx="0.8"/>
        </svg>
      </span><span>Entraînement</span>
    </button>
    <button class="fab" id="fabLog" aria-label="Ajouter"><span class="icon-plus">+</span></button>
    <button class="navbtn" data-view="nutrition">
      <span class="navicon">
        <svg viewBox="0 0 24 24"><path class="ic-shape" d="M12.6 8.3c-.2-1.3.7-2.6 2-2.9.2 1.3-.6 2.6-2 2.9ZM12 8.6c-3.4 0-5.9 2.7-5.9 6.5 0 3.6 2.5 6.6 5 6.6 1 0 1.4-.5 1.9-.5s.9.5 1.9.5c2.5 0 5-3 5-6.6 0-3.8-2.5-6.5-5.9-6.5-.7 0-1.4.2-2 .5Z"/></svg>
      </span><span>Nutrition</span>
    </button>
    <button class="navbtn" data-view="reglages">
      <span class="navicon">
        <svg viewBox="0 0 24 24">
          <circle class="ic-shape" cx="12" cy="12" r="3.1"/>
          <rect class="ic-shape" x="10.7" y="2.3" width="2.6" height="4" rx="1"/>
          <rect class="ic-shape" x="10.7" y="2.3" width="2.6" height="4" rx="1" transform="rotate(60 12 12)"/>
          <rect class="ic-shape" x="10.7" y="2.3" width="2.6" height="4" rx="1" transform="rotate(120 12 12)"/>
          <rect class="ic-shape" x="10.7" y="2.3" width="2.6" height="4" rx="1" transform="rotate(180 12 12)"/>
          <rect class="ic-shape" x="10.7" y="2.3" width="2.6" height="4" rx="1" transform="rotate(240 12 12)"/>
          <rect class="ic-shape" x="10.7" y="2.3" width="2.6" height="4" rx="1" transform="rotate(300 12 12)"/>
        </svg>
      </span><span>Réglages</span>
    </button>
  </nav>

</div>

<!-- MODAL ROOT -->
<div id="modalRoot"></div>

<script src="vendor/zxing.min.js" defer></script>
<script src="app.js?v=13" defer></script>
</body>
</html>
